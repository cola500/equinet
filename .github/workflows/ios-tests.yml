name: iOS Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  push:
    branches: [main]
    paths:
      - 'ios/**'

jobs:
  ios-tests:
    name: iOS Build & Tests
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          # Find the latest available Xcode version
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build
        run: |
          xcodebuild build \
            -project ios/Equinet/Equinet.xcodeproj \
            -scheme Equinet \
            -destination 'generic/platform=iOS Simulator' \
            -quiet

      - name: Run tests
        run: |
          xcodebuild test \
            -project ios/Equinet/Equinet.xcodeproj \
            -scheme Equinet \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:EquinetTests \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-test-results
          path: TestResults.xcresult
          retention-days: 7
