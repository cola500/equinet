name: iOS Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-tests.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-tests.yml'
  workflow_dispatch:

jobs:
  ios-tests:
    name: iOS Build & Tests
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          # Find the latest available Xcode version
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Find simulator
        id: simulator
        run: |
          # Pick best available iPhone simulator
          SIM_NAME=$(xcodebuild -showdestinations \
            -project ios/Equinet/Equinet.xcodeproj \
            -scheme Equinet 2>/dev/null \
            | grep 'platform:iOS Simulator' \
            | grep -oE 'name:[^}]+' \
            | sed 's/name://' \
            | grep 'iPhone' \
            | sort -V \
            | tail -1 \
            | xargs)
          echo "Using simulator: $SIM_NAME"
          echo "name=$SIM_NAME" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          # xcodebuild may exit 65 due to SpeechRecognizer aurioc warning
          # in simulator even when all tests pass. Capture output and verify
          # actual test results instead of relying on exit code.
          #
          # CalendarSyncManagerTests are skipped in pull_request runs.
          # These EventKit-related tests are significantly slower than the rest of the suite.
          # Full suite still runs on push to main.
          SKIP_FLAG=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SKIP_FLAG="-skip-testing:EquinetTests/CalendarSyncManagerTests"
          fi

          set +e
          xcodebuild test \
            -project ios/Equinet/Equinet.xcodeproj \
            -scheme Equinet \
            -destination 'platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}' \
            -only-testing:EquinetTests \
            $SKIP_FLAG \
            -resultBundlePath TestResults.xcresult 2>&1 | tee xcodebuild-output.log
          EXIT_CODE=$?
          set -e

          # Check actual test results from output
          if grep -q "Executed.*with 0 failures" xcodebuild-output.log; then
            echo "All tests passed (0 failures)"
            TOTAL=$(grep "Executed.*with 0 failures" xcodebuild-output.log | tail -1)
            echo "$TOTAL"
            exit 0
          else
            echo "Tests had actual failures:"
            grep -E "(Executed|FAIL|error:)" xcodebuild-output.log || true
            exit $EXIT_CODE
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-test-results
          path: |
            TestResults.xcresult
            xcodebuild-output.log
          retention-days: 7
