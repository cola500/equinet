name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Unit tests with coverage enforcement
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equinet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

  # E2E tests -- uses Supabase local dev for real auth
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      # Dummy URL for prisma generate during npm ci (overridden after supabase start)
      DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local dev
        run: npx supabase start

      - name: Export Supabase keys
        run: |
          SUPABASE_STATUS=$(npx supabase status -o json)
          # Use localhost instead of 127.0.0.1 for consistent cookie domain
          SUPABASE_URL=$(echo $SUPABASE_STATUS | jq -r '.API_URL' | sed 's/127.0.0.1/localhost/')
          echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo $SUPABASE_STATUS | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $SUPABASE_STATUS | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV
          DB_URL=$(echo $SUPABASE_STATUS | jq -r '.DB_URL' | sed 's/127.0.0.1/localhost/')
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          echo "DIRECT_DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          echo "E2E_DATABASE_URL=$DB_URL" >> $GITHUB_ENV

      - name: Create .env.local for Next.js dev server
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env.local
          echo "DIRECT_DATABASE_URL=$DIRECT_DATABASE_URL" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.local
          echo "E2E_DATABASE_URL=$E2E_DATABASE_URL" >> .env.local
          echo "ALLOW_TEST_ENDPOINTS=true" >> .env.local

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Install auth triggers
        run: npx prisma db execute --file supabase/auth-triggers.sql --url "$DATABASE_URL"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for dev server readiness
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000 2>/dev/null; do sleep 2; done' || true
        continue-on-error: true

      - name: Run E2E tests
        env:
          DEBUG: pw:webserver
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: npx supabase stop

  # TypeScript type checking
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equinet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run TypeScript compiler
        run: NODE_OPTIONS="--max-old-space-size=8192" npx tsc --project tsconfig.typecheck.json

  # Linting (if ESLint is configured)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equinet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check Swedish characters
        run: npm run check:swedish

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Warn, don't block initially

  # Build verification
  build:
    name: Build Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equinet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_test
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-build-only
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run build

  # Migration from scratch -- catches broken migrations that fail on a clean DB
  migration-from-scratch:
    name: Migration From Scratch
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equinet_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_migration_test
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equinet_migration_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase-kompatibel miljö
        env:
          PGPASSWORD: postgres
        run: |
          # Migrations refererar till Supabase-roller OCH auth-schema som inte finns i ren PostgreSQL.
          # Skapa mock-versioner -- matchar vad Supabase skapar automatiskt.

          # 1. Roller
          psql -h localhost -U postgres -d equinet_migration_test -c "CREATE ROLE supabase_auth_admin;"
          psql -h localhost -U postgres -d equinet_migration_test -c "CREATE ROLE anon;"
          psql -h localhost -U postgres -d equinet_migration_test -c "CREATE ROLE authenticated;"

          # 2. auth-schema med mock-funktioner (auth.uid(), auth.jwt(), auth.users)
          # Används av RLS-policies. Supabase skapar dessa automatiskt.
          psql -h localhost -U postgres -d equinet_migration_test <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;

          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text,
            raw_user_meta_data jsonb,
            raw_app_meta_data jsonb,
            created_at timestamptz DEFAULT now()
          );

          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid AS $$
            SELECT NULLIF(current_setting('request.jwt.claim.sub', true), '')::uuid;
          $$ LANGUAGE sql STABLE;

          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb AS $$
            SELECT COALESCE(
              NULLIF(current_setting('request.jwt.claims', true), '')::jsonb,
              '{}'::jsonb
            );
          $$ LANGUAGE sql STABLE;

          GRANT USAGE ON SCHEMA auth TO supabase_auth_admin, anon, authenticated;
          GRANT SELECT ON auth.users TO supabase_auth_admin, anon, authenticated;
          GRANT EXECUTE ON FUNCTION auth.uid() TO supabase_auth_admin, anon, authenticated;
          GRANT EXECUTE ON FUNCTION auth.jwt() TO supabase_auth_admin, anon, authenticated;
          SQL

      - name: Run all migrations from scratch
        run: npx prisma migrate reset --force --skip-seed

  # Final status check
  quality-gate-passed:
    name: Quality Gate Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, type-check, build, lint, security-audit, migration-from-scratch]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "❌ E2E tests failed"
            exit 1
          fi
          if [[ "${{ needs.type-check.result }}" != "success" ]]; then
            echo "❌ TypeScript check failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint check failed"
            exit 1
          fi
          if [[ "${{ needs.migration-from-scratch.result }}" != "success" ]]; then
            echo "❌ Migration from scratch failed"
            exit 1
          fi
          if [[ "${{ needs.security-audit.result }}" != "success" ]]; then
            echo "⚠️ Security audit had issues (non-blocking)"
          fi
          echo "✅ All quality gates passed!"
