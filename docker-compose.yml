# FALLBACK: Enkel PostgreSQL utan Supabase Auth/RLS/triggers.
# Primärt dev-flöde använder numera `supabase start` (npm run db:up).
# Denna fil behålls som fallback om Supabase CLI inte är installerat.
#
# Fallback-kommandon:
#   npm run db:up:docker    (docker compose up -d --wait)
#   npm run db:down:docker  (docker compose down)
#   npm run db:nuke:docker  (docker compose down -v)
#
# OBS: Docker-DB saknar auth-schema, RLS-policies och custom_access_token_hook.
# Ändra DATABASE_URL till postgresql://postgres:postgres@localhost:5432/equinet

services:
  db:
    image: postgres:17-alpine
    container_name: equinet-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: equinet
    volumes:
      - equinet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  equinet_pgdata:
